services:
  backend:
    build:
      context: ./backend
      target: production
    environment:
      PORT: "2320"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    expose:
      - "2320"
    ports:
      - "2320:2320"
    networks:
      - app

  frontend:
    build:
      context: ./frontend
    environment:
      HOST: "0.0.0.0"
      PORT: "4200"
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge
